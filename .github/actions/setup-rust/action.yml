name: Set up Rust
description: |
  Installs a Rust toolchain with cargo build cache.

  ⚠ Does NOT check out the repo — composite actions can't (they're
  resolved from the on-disk checkout). Each job must do checkout
  itself BEFORE invoking this action. For workspaces that path-dep
  onto the sibling octra-foundry repo, add two checkout steps:

      - uses: actions/checkout@v4
        with: { path: octra }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/octra-foundry, path: octra-foundry }
      - uses: ./octra/.github/actions/setup-rust

  and set the job-level default working-directory to `octra`.
inputs:
  toolchain:
    description: "Toolchain channel (stable, nightly, etc.)"
    required: false
    default: stable
  components:
    description: "Comma-separated rustup components (clippy, rustfmt, ...)"
    required: false
    default: ""
  targets:
    description: "Comma-separated cross-compile targets"
    required: false
    default: ""
  cache:
    description: "Whether to enable Swatinem/rust-cache (true/false)"
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}
    - if: inputs.cache == 'true'
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: octra
