name: Set up Rust
description: |
  Checks out this repo into `octra/` AND the sibling `octra-foundry/`
  (which owns the `octraforge` + `octra-mock-rpc` crates this
  workspace path-deps into), then installs a Rust toolchain with
  cargo build cache. Both repos end up side-by-side at
  `$GITHUB_WORKSPACE` so the `../../../octra-foundry/...` path deps
  resolve. Jobs using this action should `cd octra` (or set
  `working-directory: octra`) before running `cargo`.
inputs:
  toolchain:
    description: "Toolchain channel (stable, nightly, etc.)"
    required: false
    default: stable
  components:
    description: "Comma-separated rustup components (clippy, rustfmt, ...)"
    required: false
    default: ""
  targets:
    description: "Comma-separated cross-compile targets"
    required: false
    default: ""
  cache:
    description: "Whether to enable Swatinem/rust-cache (true/false)"
    required: false
    default: "true"
  foundry-ref:
    description: "Branch/tag/sha of octra-foundry to check out"
    required: false
    default: main

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        path: octra
    - uses: actions/checkout@v4
      with:
        repository: androolloyd/octra-foundry
        ref: ${{ inputs.foundry-ref }}
        path: octra-foundry
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}
    - if: inputs.cache == 'true'
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: octra
