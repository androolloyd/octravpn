name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
          cache: "false"
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-rust
      - run: cargo test --workspace --all-features

  aml-compile:
    name: AML compile-gate (real Octra)
    runs-on: ubuntu-latest
    # Stays advisory: don't block CI on a transient Octra RPC outage,
    # but always run and surface the result.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install python3 + curl
        run: |
          sudo apt-get update -y >/dev/null
          sudo apt-get install -y python3 curl >/dev/null
      - name: Compile program/main.aml on https://octra.network/rpc
        run: ./scripts/compile-check.sh

  tla:
    name: TLC model check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Download TLA+ tools
        run: |
          curl -L -o /tmp/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar
      - name: Run TLC
        run: |
          cd proofs/tla
          java -cp /tmp/tla2tools.jar tlc2.TLC \
            -workers auto -deadlock OctraVPN -config OctraVPN.cfg

  tamarin:
    name: Tamarin prove
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tamarin
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends maude graphviz
          curl -L -o /tmp/tamarin.zip \
            https://github.com/tamarin-prover/tamarin-prover/releases/latest/download/tamarin-prover-1.10.0-linux64-ubuntu.tar.gz \
            || true
      - name: Run prove (best-effort; advisory only)
        run: |
          if command -v tamarin-prover; then
            cd proofs/tamarin && tamarin-prover --prove octravpn.spthy
          else
            echo "tamarin-prover not installed in this runner; skipping"
          fi
        continue-on-error: true

  lean:
    name: Lean build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: lake build
        run: |
          cd proofs/lean && lake build || echo "::warning::Lean build failed; treated as advisory."

  kani:
    name: Kani harnesses
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-rust
      - name: Install Kani
        run: |
          cargo install --locked kani-verifier || true
          cargo kani setup || true
      - name: Run harnesses
        run: |
          cd proofs/kani && cargo kani || echo "::warning::Kani run skipped."
        continue-on-error: true

  docker-e2e:
    name: docker-compose e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Endpoint-registration smoke
        run: ./docker/e2e.sh
      - name: Full tailnet happy-path
        run: ./docker/e2e-tailnet.sh

  coverage:
    name: cargo tarpaulin (coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-rust
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked || true
      - name: Run coverage
        run: |
          cargo tarpaulin --workspace --timeout 300 \
            --out Xml --output-dir coverage \
            --exclude-files 'target/*' 'fuzz/*' 'crates/*/benches/*' \
            || echo "::warning::tarpaulin run failed; not blocking CI"
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false

  bench:
    name: criterion smoke
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-rust
      - name: Build benches
        run: cargo bench -p octravpn-core --no-run

  audit:
    name: cargo audit + deny
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-rust
        with:
          cache: "false"
      - name: Install audit + deny
        run: |
          cargo install --locked cargo-audit cargo-deny || true
      - name: cargo audit
        run: cargo audit --deny warnings || true
      - name: cargo deny check
        run: cargo deny check || true

  fuzz-build:
    name: cargo fuzz build (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
      - name: Install cargo-fuzz
        run: cargo install --locked cargo-fuzz || true
      - name: Build fuzz targets
        working-directory: fuzz
        run: |
          cargo +nightly fuzz build receipt_decode || true
          cargo +nightly fuzz build onion_peel || true
          cargo +nightly fuzz build tx_canonical || true
