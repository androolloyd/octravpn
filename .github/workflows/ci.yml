name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: octra
    steps:
      - uses: actions/checkout@v4
        with: { path: octra }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/octra-foundry, path: octra-foundry }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/headscale-rs, path: headscale-rs }
      # nightly rustfmt: `cargo fmt --all` reaches the path-dep'd
      # headscale-rs sibling, whose `rustfmt.toml` `ignore`s its
      # tonic-generated `headscale.v1.rs` — but `ignore` is a
      # nightly-only rustfmt feature, so on a stable toolchain it's
      # silently dropped and the (un-formattable) generated file fails
      # the check. We install nightly here AND invoke `cargo +nightly`
      # below, because the repo's `rust-toolchain.toml` pins 1.88 and a
      # plain `cargo fmt` would honour that file over the installed
      # nightly. octra's own code formats identically under either (it
      # uses only stable rustfmt features, no octra-level rustfmt.toml).
      - uses: ./octra/.github/actions/setup-rust
        with:
          toolchain: nightly
          components: rustfmt
          cache: "false"
      - run: cargo +nightly fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: octra
    steps:
      - uses: actions/checkout@v4
        with: { path: octra }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/octra-foundry, path: octra-foundry }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/headscale-rs, path: headscale-rs }
      - uses: ./octra/.github/actions/setup-rust
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # publish_unverified lives behind the test-helpers feature; the
      # mesh tests + bench require it. Run a second clippy pass with
      # the feature on so the test cfg gets lint-coverage too.
      - run: cargo clippy --workspace --tests --features test-helpers -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: octra
    steps:
      - uses: actions/checkout@v4
        with: { path: octra }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/octra-foundry, path: octra-foundry }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/headscale-rs, path: headscale-rs }
      - uses: ./octra/.github/actions/setup-rust
      - run: cargo test --workspace --all-targets --all-features
      # Extra explicit run with the mesh test-helpers feature so a
      # change that builds under --all-features but breaks the
      # feature-isolated build fails CI here. Matches scripts/test-all.sh.
      - run: cargo test -p octravpn-mesh --all-targets --features test-helpers

  bench-regression:
    # Compares a fresh octravpn-core bench run against the committed
    # snapshot at bench-snapshots/core.json. Lives in its own job so a
    # slow / noisy bench run doesn't gate the cargo lane.
    #
    # Advisory: GH-hosted ubuntu-latest runners exhibit ~20-30% bench-to-
    # bench wall-clock variance (shared infra, neighbour noise, no perf
    # isolation). Keep the signal visible but don't block PR merges on it;
    # treat it as a smoke alarm — investigate when it fires alongside a
    # plausible code-side perf change, ignore when it fires in isolation.
    name: bench regression gate
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: octra
    steps:
      - uses: actions/checkout@v4
        with: { path: octra }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/octra-foundry, path: octra-foundry }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/headscale-rs, path: headscale-rs }
      - uses: ./octra/.github/actions/setup-rust
      - name: Install jq
        run: sudo apt-get update -y >/dev/null && sudo apt-get install -y jq >/dev/null
      - name: Compare against bench-snapshots/core.json
        # Short measurement time so the runner doesn't sit for ~30 min.
        # The 20% threshold floor is wide enough to absorb the noise.
        env:
          BENCH_REGRESSION_QUICK: "1"
        run: ./scripts/bench-regression.sh

  aml-compile:
    name: AML compile-gate (real Octra)
    runs-on: ubuntu-latest
    # Stays advisory: don't block CI on a transient Octra RPC outage,
    # but always run and surface the result.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install python3 + curl
        run: |
          sudo apt-get update -y >/dev/null
          sudo apt-get install -y python3 curl >/dev/null
      - name: Compile program/main.aml on https://octra.network/rpc
        run: ./scripts/compile-check.sh

  tla:
    name: TLC model check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Download TLA+ tools
        run: |
          curl -L -o /tmp/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar
      - name: Run TLC (v1.1)
        run: |
          cd proofs/tla
          java -cp /tmp/tla2tools.jar tlc2.TLC \
            -workers auto -deadlock OctraVPN -config OctraVPN.cfg
      - name: Run TLC (v2)
        run: |
          cd proofs/tla
          java -cp /tmp/tla2tools.jar tlc2.TLC \
            -workers auto -deadlock OctraVPN_V2 -config OctraVPN_V2.cfg

  tamarin:
    name: Tamarin prove
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tamarin
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends maude graphviz
          curl -L -o /tmp/tamarin.zip \
            https://github.com/tamarin-prover/tamarin-prover/releases/latest/download/tamarin-prover-1.10.0-linux64-ubuntu.tar.gz \
            || true
      - name: Run prove (best-effort; advisory only)
        run: |
          if command -v tamarin-prover; then
            cd proofs/tamarin && tamarin-prover --prove octravpn.spthy
          else
            echo "tamarin-prover not installed in this runner; skipping"
          fi
        continue-on-error: true

  lean:
    name: Lean build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: lake build
        run: |
          cd proofs/lean && lake build

  kani:
    name: Kani harnesses
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: octra
    steps:
      - uses: actions/checkout@v4
        with: { path: octra }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/octra-foundry, path: octra-foundry }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/headscale-rs, path: headscale-rs }
      - uses: ./octra/.github/actions/setup-rust
      - name: Install Kani
        run: |
          cargo install --locked kani-verifier || true
          cargo kani setup || true
      - name: Run harnesses
        run: |
          cd proofs/kani && cargo kani || echo "::warning::Kani run skipped."
        continue-on-error: true

  docker-e2e:
    name: docker-compose e2e
    runs-on: ubuntu-latest
    # Now a required gate: the foundry-context build + tailnet
    # happy-path run green end-to-end in CI (default docker driver +
    # tracked stub keys + two-step settle). Was advisory while those
    # were shaking out.
    steps:
      - uses: actions/checkout@v4
        with: { path: octra }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/octra-foundry, path: octra-foundry }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/headscale-rs, path: headscale-rs }
      # NB: do NOT add docker/setup-buildx-action here. It switches to
      # the `docker-container` buildx driver, whose build store is
      # isolated from the host daemon — so the `octravpn-builder:latest`
      # image that `e2e.sh` builds first becomes invisible to the
      # downstream `FROM octravpn-builder:latest` builds, which then try
      # (and fail) to pull it from Docker Hub. The runner's default
      # docker driver shares the local image store, matching dev boxes.
      - name: Endpoint-registration smoke
        run: cd octra && ./docker/e2e.sh
      - name: Full tailnet happy-path
        run: cd octra && ./docker/e2e-tailnet.sh

  coverage:
    name: cargo tarpaulin (coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: octra
    steps:
      - uses: actions/checkout@v4
        with: { path: octra }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/octra-foundry, path: octra-foundry }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/headscale-rs, path: headscale-rs }
      - uses: ./octra/.github/actions/setup-rust
      # cargo-tarpaulin's recent releases lock a dependency tree that
      # needs rustc 1.91 (cargo-platform 0.3.3), so `cargo install`
      # fails on the repo's pinned 1.88. Pull a prebuilt binary instead
      # — no compile, no MSRV coupling. coverage.sh's `cargo tarpaulin
      # --version` guard then skips its own install.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - name: Run coverage
        run: ./scripts/coverage.sh

  bench:
    name: criterion smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: octra
    steps:
      - uses: actions/checkout@v4
        with: { path: octra }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/octra-foundry, path: octra-foundry }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/headscale-rs, path: headscale-rs }
      - uses: ./octra/.github/actions/setup-rust
      - name: Build benches
        run: cargo bench -p octravpn-core --no-run

  audit:
    name: cargo audit + deny
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: octra
    steps:
      - uses: actions/checkout@v4
        with: { path: octra }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/octra-foundry, path: octra-foundry }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/headscale-rs, path: headscale-rs }
      - uses: ./octra/.github/actions/setup-rust
        with:
          cache: "false"
      - name: Install audit + deny
        run: |
          cargo install --locked cargo-audit cargo-deny
      - name: cargo audit
        run: cargo audit --deny warnings
      - name: cargo deny check
        run: cargo deny check

  fuzz-build:
    name: cargo fuzz build (smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: octra
    steps:
      - uses: actions/checkout@v4
        with: { path: octra }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/octra-foundry, path: octra-foundry }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/headscale-rs, path: headscale-rs }
      - uses: ./octra/.github/actions/setup-rust
        with:
          toolchain: nightly
      - name: Install cargo-fuzz
        run: cargo install --locked cargo-fuzz
      - name: Check fuzz corpus inventory
        run: ./scripts/check-fuzz-corpus.sh
      - name: Build fuzz targets
        working-directory: octra/fuzz
        run: |
          cargo +nightly fuzz build receipt_decode
          cargo +nightly fuzz build onion_peel
          cargo +nightly fuzz build tx_canonical
