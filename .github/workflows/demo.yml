# Nightly + on-demand regeneration of the demo recordings.
#
# This workflow is intentionally separate from ci.yml / fuzz.yml /
# release.yml — it has different secrets, a different cadence, and
# different artefacts. Coordinate with #241 + #243 by adding files,
# never editing the others.
#
# The workflow only renders tapes that do not require external services
# (Docker, the foundry binary, sibling repos). Tapes 05 / 06 are
# explicitly skipped here and stay in the manual-record set; see
# `docs/demo.md`.

name: demo

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"   # 06:17 UTC nightly

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          path: octravpn

      - name: Checkout sibling repos (octra-foundry, headscale-rs)
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/androolloyd/octra-foundry.git
          git clone --depth 1 https://github.com/androolloyd/headscale-rs.git
          ls -la

      - name: Install vhs + ttyd + ffmpeg
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd chromium-browser jq
          VHS_VERSION=$(curl -sL https://api.github.com/repos/charmbracelet/vhs/releases/latest | jq -r .tag_name)
          curl -sL "https://github.com/charmbracelet/vhs/releases/download/${VHS_VERSION}/vhs_${VHS_VERSION#v}_amd64.deb" -o /tmp/vhs.deb
          sudo dpkg -i /tmp/vhs.deb
          vhs --version

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build octravpn binaries needed by tapes
        working-directory: octravpn
        run: |
          set -euo pipefail
          cargo build --release -p octravpn-client -p octravpn-node
          echo "${PWD}/target/release" >> "$GITHUB_PATH"

      - name: Render dependency-light tapes
        working-directory: octravpn
        run: |
          set -euo pipefail
          mkdir -p demo/recordings
          # Tapes 01 + 04 need our octravpn / octravpn-node binaries (built above).
          # Tapes 11..16 are narration-shape (CLI surfaces only); they need
          # the same binaries but no Docker / chain / sibling repos.
          # Tape 07 needs the headscale CLI from the sibling repo — skipped in CI.
          for tape in demo/tapes/01-*.tape \
                     demo/tapes/04-*.tape \
                     demo/tapes/11-*.tape \
                     demo/tapes/12-*.tape \
                     demo/tapes/13-*.tape \
                     demo/tapes/14-*.tape \
                     demo/tapes/15-*.tape \
                     demo/tapes/16-*.tape; do
              echo "=== ${tape} ==="
              vhs "${tape}" || echo "  ! ${tape} failed (non-fatal in nightly)"
          done
          ls -la demo/recordings/ || true

      - name: Upload recordings
        uses: actions/upload-artifact@v4
        with:
          name: demo-recordings
          path: octravpn/demo/recordings/
          if-no-files-found: warn

      - name: Commit refreshed recordings back to repo (light job)
        working-directory: octravpn
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain demo/recordings/)" ]]; then
              echo "no recording changes to commit"
              exit 0
          fi
          git config user.name  "octravpn-demo-bot"
          git config user.email "octravpn-demo-bot@users.noreply.github.com"
          git add demo/recordings/
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "ci(demo): refresh light recordings ${DATE}" \
                     -m "[skip ci]" \
                     -m "Auto-generated by demo.yml render job (run ${GITHUB_RUN_ID})."
          # Light job may race the heavy job's push; rebase + retry once.
          git pull --rebase origin main || true
          git push origin HEAD:main

  # ---------------------------------------------------------------------
  # Heavy job: render tapes 08/09/10 which drive the full
  # docker-compose.mesh-demo.yml stack (3 stock tailscale clients +
  # mesh-control + derp-1 + analytics). Same docker-compose flow the
  # tailscale-interop test (Wall 7) drives in CI, scaled to 3 peers.
  #
  # The job is intentionally separate from the dependency-light job
  # above so a docker-daemon hiccup on the runner can't break the
  # nightly tapes 01/04 rendering.
  # ---------------------------------------------------------------------
  render-heavy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          path: octravpn

      - name: Checkout sibling repos
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/androolloyd/octra-foundry.git
          git clone --depth 1 https://github.com/androolloyd/headscale-rs.git
          ls -la

      - name: Install vhs + jq + openssl
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd chromium-browser jq openssl
          VHS_VERSION=$(curl -sL https://api.github.com/repos/charmbracelet/vhs/releases/latest | jq -r .tag_name)
          curl -sL "https://github.com/charmbracelet/vhs/releases/download/${VHS_VERSION}/vhs_${VHS_VERSION#v}_amd64.deb" -o /tmp/vhs.deb
          sudo dpkg -i /tmp/vhs.deb
          vhs --version

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build octravpn-node + analytics (debug for compose mount + release for host CLI)
        working-directory: octravpn
        run: |
          set -euo pipefail
          # Two builds because the docker-compose.mesh-demo.yml bind-mounts
          # target/linux-debug/debug/* into the containers, while the host
          # tape uses target/release/octravpn-node for the `mesh status`
          # CLI invocation. The release build is faster to cargo-incremental
          # so we do it second.
          cargo build -p octravpn-node -p octravpn-analytics
          mkdir -p target/linux-debug/debug
          cp target/debug/octravpn-node target/linux-debug/debug/
          cp target/debug/octravpn-analytics target/linux-debug/debug/
          cargo build --release -p octravpn-node -p octravpn-analytics
          echo "${PWD}/target/release" >> "$GITHUB_PATH"

      - name: Render heavy tapes (each tape's failure is non-fatal)
        working-directory: octravpn
        run: |
          set -euo pipefail
          mkdir -p demo/recordings
          # Tapes 17..22 + the master tour all depend on the mesh +
          # chain fixtures the 3node-mesh-bringup.sh helper installs.
          # We do a best-effort teardown between tapes so a bad
          # bringup in tape N doesn't poison tape N+1.
          for tape in demo/tapes/05-v3-smoke.tape \
                     demo/tapes/08-3node-mesh.tape \
                     demo/tapes/09-traffic-patterns.tape \
                     demo/tapes/10-metrics-grafana.tape \
                     demo/tapes/17-operator-onboarding.tape \
                     demo/tapes/18-tailnet-owner-policy.tape \
                     demo/tapes/19-circle-update-atomic.tape \
                     demo/tapes/20-pvac-rotation.tape \
                     demo/tapes/21-audit-verify.tape \
                     demo/tapes/22-headscale-cli-tour.tape \
                     demo/tapes/00-master-tour.tape; do
              echo "=== ${tape} ==="
              bash demo/lib/3node-mesh-teardown.sh >/dev/null 2>&1 || true
              vhs "${tape}" || echo "  ! ${tape} failed (non-fatal in nightly)"
          done
          bash demo/lib/3node-mesh-teardown.sh >/dev/null 2>&1 || true
          ls -la demo/recordings/ || true

      - name: Upload heavy recordings
        uses: actions/upload-artifact@v4
        with:
          name: demo-recordings-heavy
          path: octravpn/demo/recordings/
          if-no-files-found: warn

      - name: Commit refreshed recordings back to repo
        working-directory: octravpn
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain demo/recordings/)" ]]; then
              echo "no recording changes to commit"
              exit 0
          fi
          git config user.name  "octravpn-demo-bot"
          git config user.email "octravpn-demo-bot@users.noreply.github.com"
          git add demo/recordings/
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "ci(demo): refresh recordings ${DATE}" \
                     -m "[skip ci]" \
                     -m "Auto-generated by demo.yml render-heavy job (run ${GITHUB_RUN_ID}). README gifs use relative paths, so this push updates the README inline."
          git pull --rebase origin main || true
          git push origin HEAD:main
