# Nightly + on-demand regeneration of the demo recordings.
#
# This workflow is intentionally separate from ci.yml / fuzz.yml /
# release.yml — it has different secrets, a different cadence, and
# different artefacts. Coordinate with #241 + #243 by adding files,
# never editing the others.
#
# The `render` job covers tapes that need nothing more than the
# octravpn binaries + a synthesized audit fixture + the standalone
# `headscale` CLI. The `render-heavy` job covers tapes that drive
# Docker + the 3-node mesh + the portal (tape 02) + devnet bringups +
# the PVAC sidecar + the audit fixture. See `docs/demo.md` for the
# full per-tape matrix.
#
# Tapes intentionally not rendered in CI: none — every tape in
# `demo/tapes/` is routed to one of the two jobs below. If a tape
# can't render on a runner (e.g. needs a real GUI or a 3rd-party
# service), document that inline next to its entry in the for-loop.
#
# Grouping discipline (see the per-job render steps): tapes that
# share a harness are rendered back-to-back, with ONE bringup before
# the group and ONE teardown after. The bringup helpers are
# idempotent, so a tape's inline `Source` directive that re-runs the
# same bringup is a fast no-op. This trims the per-tape ~90s bringup
# overhead from N×90s to 1×90s per harness.

name: demo

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"   # 06:17 UTC nightly

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          path: octra

      - name: Checkout sibling repos (octra-foundry, headscale-rs)
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/androolloyd/octra-foundry.git
          git clone --depth 1 https://github.com/androolloyd/headscale-rs.git
          ls -la

      - name: Install vhs + ttyd + ffmpeg + espeak-ng
        run: |
          set -euo pipefail
          sudo apt-get update
          # espeak-ng is the TTS backend used by demo/lib/render-with-audio.sh
          # on linux; on macOS the same script picks up /usr/bin/say.
          sudo apt-get install -y ffmpeg ttyd chromium-browser jq espeak-ng protobuf-compiler libprotobuf-dev
          VHS_VERSION=$(curl -sL https://api.github.com/repos/charmbracelet/vhs/releases/latest | jq -r .tag_name)
          curl -sL "https://github.com/charmbracelet/vhs/releases/download/${VHS_VERSION}/vhs_${VHS_VERSION#v}_amd64.deb" -o /tmp/vhs.deb
          sudo dpkg -i /tmp/vhs.deb
          vhs --version

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build octravpn binaries needed by tapes (host)
        working-directory: octra
        run: |
          set -euo pipefail
          cargo build --release -p octravpn-client -p octravpn-node
          echo "${PWD}/target/release" >> "$GITHUB_PATH"

      - name: Build octravpn-builder image (gives the Linux-binary build step a protoc-equipped container)
        run: |
          set -euo pipefail
          # build-linux-binaries.sh falls back to vanilla rust:1.88-bookworm
          # + an inline `apt-get install protobuf-compiler libprotobuf-dev` preamble when
          # `octravpn-builder:latest` isn't present. In CI we run that
          # script as non-root (--user $(id -u):$(id -g)) so the bind-
          # mounted ELFs don't land owned by uid 0 — but apt-get install
          # needs root inside the container, so the apt preamble fails.
          # Pre-build the Dockerfile.builder image (which bakes in protoc)
          # so the script sees it via `docker image inspect` and skips
          # the apt path entirely.
          #
          # Dockerfile.builder's COPYs use `octra/` paths; checkout
          # `path:` was renamed octravpn → octra so they resolve directly
          # (no more symlink / hardlink dance — see run 26342421874 for
          # the BuildKit-won't-follow-symlinks history).
          docker build \
            -f octra/docker/Dockerfile.builder \
            -t octravpn-builder:latest \
            . 2>&1 | tail -8

      - name: Build Linux binaries for fixture containers
        working-directory: octra
        run: |
          set -euo pipefail
          # Canonical entry point for the Linux binaries the demo
          # bringups bind-mount into their fixture containers. First
          # call builds (~100s); subsequent calls are sub-second.
          # Output: target/linux-debug/debug/{octravpn,octravpn-node,
          # octravpn-analytics,octra-mock-rpc}.
          # Picks up octravpn-builder:latest (built above) which has
          # protoc baked in via Dockerfile.builder.
          bash demo/lib/build-linux-binaries.sh

      - name: Build + install standalone headscale CLI (sibling repo)
        run: |
          set -euo pipefail
          # Tape 07 (`headscale-cli`) drives the standalone `headscale`
          # binary from the headscale-rs sibling — installing into
          # /usr/local/bin keeps the parity-with-upstream story
          # (same CLI, same surface) that the demo tour leans on.
          # Install into $HOME/.local — it's user-writable and the
          # default PATH on ubuntu-latest already includes it. Using
          # /usr/local would need sudo for the `cargo install`
          # registry-touch (`/usr/local/.crates.toml`).
          install_root="$HOME/.local"
          mkdir -p "$install_root/bin"
          echo "$install_root/bin" >> "$GITHUB_PATH"
          if [[ -d headscale-rs/headscale-cli ]]; then
              cargo install --path headscale-rs/headscale-cli --bin headscale --root "$install_root" --force
          elif [[ -d headscale-rs ]]; then
              # Layout fallback — newer headscale-rs checkouts may have
              # the bin at the workspace root.
              cargo install --path headscale-rs --bin headscale --root "$install_root" --force || \
                  echo "headscale build failed (tape 07 will skip)"
          else
              echo "headscale-rs sibling not cloned; tape 07 will skip"
          fi
          # GITHUB_PATH only takes effect for SUBSEQUENT steps; tell
          # the current step too so the next two commands work.
          export PATH="$install_root/bin:$PATH"
          command -v headscale || true
          headscale --version || true

      - name: Generate audit + receipt-journal fixture for tape 03
        working-directory: octra
        run: |
          set -euo pipefail
          # Tape 03 (`audit-replay`) pins these paths:
          #   demo/state/node/audit.log
          #   demo/state/node/receipts.bin
          # Synthesize a small HMAC-chained audit log + an empty
          # receipt journal so `octravpn-node audit replay` has
          # something to render. The replay path is lenient (skip
          # bad lines, accept empty journal), so we don't need a
          # full daemon roundtrip — just well-formed JSONL.
          mkdir -p demo/state/node
          python3 - <<'PY'
          import hmac, hashlib, json, os, secrets
          state_dir = "demo/state/node"
          key = secrets.token_bytes(32)
          # Sibling key so `audit verify` has a chance too (it walks
          # `<audit_path>.key` for the file-case lookup).
          with open(f"{state_dir}/audit.log.key", "wb") as f:
              f.write(key)
          records = [
              (1715000000, "session_open",  "a" * 64, {"peer": "peer-1"}),
              (1715000005, "session_open",  "b" * 64, {"peer": "peer-2"}),
              (1715000020, "bytes_used",    "a" * 64, {"bytes_used": 4096}),
              (1715000040, "receipt_sign",  "a" * 64, {"seq": 1, "bytes_used": 4096}),
              (1715000060, "bytes_used",    "b" * 64, {"bytes_used": 8192}),
              (1715000080, "receipt_sign",  "b" * 64, {"seq": 1, "bytes_used": 8192}),
              (1715000100, "session_close", "a" * 64, {"reason": "client_quit"}),
              (1715000120, "session_close", "b" * 64, {"reason": "client_quit"}),
          ]
          prev_mac = b"\x00" * 32
          with open(f"{state_dir}/audit.log", "w") as f:
              for ts, kind, sid, extra in records:
                  rec = {
                      "ts_unix": ts,
                      "kind": kind,
                      "source": None,
                      "session_id": sid,
                      "extra": extra,
                  }
                  canonical = json.dumps(rec, separators=(",", ":"), sort_keys=False)
                  mac = hmac.new(key, prev_mac + canonical.encode(), hashlib.sha256).digest()
                  chained = {
                      "record_json": canonical,
                      "prev_mac": prev_mac.hex(),
                      "mac": mac.hex(),
                  }
                  f.write(json.dumps(chained) + "\n")
                  prev_mac = mac
          # Empty journal file — replay tolerates this and renders
          # only the audit-derived rows. A future tape revision can
          # swap this for a real ReceiptJournal::bump-built fixture.
          open(f"{state_dir}/receipts.bin", "wb").close()
          print(f"wrote {len(records)} audit records + empty journal")
          PY
          ls -la demo/state/node/

      - name: Render light tapes (grouped by harness)
        working-directory: octra
        run: |
          set -euo pipefail
          mkdir -p demo/recordings

          # Per-tape renderer with preflight gate. PASS => vhs render.
          # FAIL => `::warning::` + continue (the job stays green so
          # the rest of the groups still run; the missing tape is
          # caught by the demo-bot's commit summary).
          render_tape() {
              local tape="$1"
              local skip_preflight="${2:-0}"
              echo "=== ${tape} ==="
              if [[ "${skip_preflight}" != "1" ]]; then
                  if ! bash demo/lib/preflight-tape.sh "${tape}"; then
                      echo "::warning::${tape} failed preflight — skipping vhs render"
                      return 0
                  fi
              fi
              vhs "${tape}" || echo "::warning::${tape} failed vhs render (non-fatal in nightly)"
          }

          # --- Group L1: keygen-fixture (tape 01) -----------------------
          # Single fast container (~5s bringup). Just tape 01.
          echo "--- group: keygen-fixture ---"
          bash demo/lib/keygen-fixture-bringup.sh
          render_tape demo/tapes/01-init-keygen.tape
          bash demo/lib/keygen-fixture-teardown.sh >/dev/null 2>&1 || true

          # --- Group L2: audit-fixture (tape 03) ------------------------
          # Single throwaway container with a synthesized audit.log.
          echo "--- group: audit-fixture (light) ---"
          bash demo/lib/audit-fixture-bringup.sh
          render_tape demo/tapes/03-audit-replay.tape
          bash demo/lib/audit-fixture-teardown.sh >/dev/null 2>&1 || true

          # --- Group L3: 3-node mesh (04, 07, 11, 12, 13, 14) -----------
          # One mesh bringup serves the mesh-preauth tape (04), the
          # peer-routing tapes (13, 14), and the headscale-cli tape
          # (07; the standalone CLI talks to the mesh control plane).
          # Tapes 11 + 12 are narration-shape OS-install fakes — every
          # Type line is a `#` comment so preflight is a no-op and the
          # mesh harness is not actually exercised. We render them
          # inside the group so the harness stays warm across all six
          # tapes. Preflight is skipped explicitly for 11/12 (matches
          # the previous workflow's case-statement carve-out).
          echo "--- group: 3-node-mesh (light) ---"
          bash demo/lib/3node-mesh-bringup.sh
          render_tape demo/tapes/04-mesh-preauth.tape
          render_tape demo/tapes/07-headscale-cli.tape
          render_tape demo/tapes/11-user-install-linux.tape 1
          render_tape demo/tapes/12-user-install-macos.tape 1
          render_tape demo/tapes/13-user-ssh-peer.tape
          render_tape demo/tapes/14-user-web-traffic.tape
          bash demo/lib/3node-mesh-teardown.sh >/dev/null 2>&1 || true

          ls -la demo/recordings/ || true

      - name: Mux captions + TTS audio onto light recordings
        working-directory: octra
        run: |
          set -euo pipefail
          # The .vtt files live under demo/recordings/ as siblings of
          # the .mp4 files (hand-authored; see docs/demo.md §Captions).
          # Mux them in + synthesize a narrator track via espeak-ng.
          bash demo/lib/render-with-captions.sh || echo "(captioning non-fatal)"
          bash demo/lib/render-with-audio.sh   || echo "(audio non-fatal)"
          ls -la demo/recordings/ || true

      - name: Upload recordings
        uses: actions/upload-artifact@v4
        with:
          name: demo-recordings
          path: octra/demo/recordings/
          if-no-files-found: warn

      - name: Commit refreshed recordings back to repo (light job)
        working-directory: octra
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain demo/recordings/)" ]]; then
              echo "no recording changes to commit"
              exit 0
          fi
          git config user.name  "octravpn-demo-bot"
          git config user.email "octravpn-demo-bot@users.noreply.github.com"
          git add demo/recordings/
          DATE=$(date -u +%Y-%m-%d)
          # Enumerate the tapes this run actually produced so the
          # commit log is auditable without crawling the action output.
          TAPES=$(git diff --cached --name-only demo/recordings/ \
                  | grep -Eo '[0-9]{2}-[a-z0-9-]+\.(mp4|gif)' \
                  | sort -u \
                  | tr '\n' ' ')
          git commit -m "ci(demo): refresh light recordings ${DATE}" \
                     -m "[skip ci]" \
                     -m "Tapes produced: ${TAPES:-(none)}" \
                     -m "Auto-generated by demo.yml render job (run ${GITHUB_RUN_ID})."
          # Light job may race the heavy job's push; rebase + retry once.
          git pull --rebase origin main || true
          git push origin HEAD:main

  # ---------------------------------------------------------------------
  # Heavy job: render tapes that drive the full docker-compose.mesh-demo.yml
  # stack (3 stock tailscale clients + mesh-control + derp-1 + analytics),
  # the portal container, devnet bringups, the PVAC sidecar, and the
  # audit-verify fixture. Same docker-compose flow the tailscale-interop
  # test (Wall 7) drives in CI, scaled to N peers.
  #
  # The job is intentionally separate from the dependency-light job
  # above so a docker-daemon hiccup on the runner can't break the
  # nightly tapes 01/03/04/07/11..14 rendering.
  #
  # Matrix layout: one parallel job per harness group (H1..H7). The
  # previous sequential implementation regularly blew past 90 min when
  # a single group stalled (see run 26342601617 — SIGTERM at 47 min
  # inside tape 06). Splitting trades ~5 min of duplicated per-job
  # setup for genuine parallelism. fail-fast=false so one group's
  # failure doesn't cancel the others. Each matrix job uploads its
  # recordings as `demo-recordings-h<N>`; a single aggregator job
  # (`render-heavy-aggregate`) downloads all artifacts, muxes
  # captions+audio across the combined set, and commits once.
  # ---------------------------------------------------------------------
  render-heavy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # Group H1: delegated / self-bringup (tapes 05, 06)
          # Tapes that drive their own bringup+teardown via shell
          # scripts (e2e + tailscale-interop). Preflight skipped.
          - group: h1
            name: delegated
            tapes: "05-v3-smoke.tape:1 06-tailscale-interop.tape:1"
            bringup: ""
            teardown: ""
          # Group H2: portal-container (02, 15, 16)
          # One containerized portal wired to LIVE devnet + demo circle.
          - group: h2
            name: portal-container
            tapes: "02-portal-fetch.tape 15-user-oct-url-public.tape 16-user-oct-url-sealed.tape"
            bringup: "demo/lib/portal-container-bringup.sh"
            teardown: "demo/lib/portal-container-teardown.sh"
          # Group H3: 3-node mesh (08, 09, 10, 18, 22)
          # Full compose stack: 3 tailscale peers + derp-1 + analytics +
          # grafana. Tapes 18+22 drive the headscale control plane.
          - group: h3
            name: 3node-mesh
            tapes: "08-3node-mesh.tape 09-traffic-patterns.tape 10-metrics-grafana.tape 18-tailnet-owner-policy.tape 22-headscale-cli-tour.tape"
            bringup: "demo/lib/3node-mesh-bringup.sh"
            teardown: "demo/lib/3node-mesh-teardown.sh"
          # Group H4: devnet (17, 19)
          # devnet-bringup deploys demo circle + node1/2/3 against live devnet.
          - group: h4
            name: devnet
            tapes: "17-operator-onboarding.tape 19-circle-update-atomic.tape"
            bringup: "demo/lib/devnet-bringup.sh"
            teardown: "demo/lib/devnet-teardown.sh"
          # Group H5: pvac (20)
          # PVAC sidecar Dockerfile compiles GPL'd C++ — cold build 3-5 min.
          - group: h5
            name: pvac
            tapes: "20-pvac-rotation.tape"
            bringup: "demo/lib/pvac-bringup.sh"
            teardown: "demo/lib/pvac-teardown.sh"
          # Group H6: audit-fixture (21)
          # Same fixture container as light tape 03 but with the full
          # heavy-job binary stack so `audit verify` walks the journal.
          - group: h6
            name: audit-fixture
            tapes: "21-audit-verify.tape"
            bringup: "demo/lib/audit-fixture-bringup.sh"
            teardown: "demo/lib/audit-fixture-teardown.sh"
          # Group H7: master-tour (00)
          # The master tour's own `Source` directives bring up whichever
          # harnesses it touches (idempotent). With the matrix split it
          # runs in its OWN runner, so the previous "must come last so
          # prior teardowns leave a clean slate" constraint is moot —
          # this job starts on a fresh ubuntu-latest with nothing else
          # running. Per-tape preflight still gates each segment.
          - group: h7
            name: master-tour
            tapes: "00-master-tour.tape"
            bringup: ""
            teardown: ""
    steps:
      - uses: actions/checkout@v4
        with:
          path: octra

      - name: Checkout sibling repos
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/androolloyd/octra-foundry.git
          git clone --depth 1 https://github.com/androolloyd/headscale-rs.git
          ls -la

      - name: Install vhs + jq + openssl + espeak-ng
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd chromium-browser jq openssl espeak-ng protobuf-compiler libprotobuf-dev
          VHS_VERSION=$(curl -sL https://api.github.com/repos/charmbracelet/vhs/releases/latest | jq -r .tag_name)
          curl -sL "https://github.com/charmbracelet/vhs/releases/download/${VHS_VERSION}/vhs_${VHS_VERSION#v}_amd64.deb" -o /tmp/vhs.deb
          sudo dpkg -i /tmp/vhs.deb
          vhs --version

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Distinct cache key per matrix value so 7 parallel jobs
          # don't trample each other's incremental artifacts.
          key: render-heavy-${{ matrix.group }}

      - name: Build octravpn-node + analytics (host release for compose mount fallback)
        working-directory: octra
        run: |
          set -euo pipefail
          # Host-side release builds: tapes invoke `octravpn` /
          # `octravpn-node` from the recording terminal (NOT inside
          # docker) for the `mesh status` CLI surface. The Linux fixture
          # binaries (the ones actually bind-mounted into containers)
          # are produced by build-linux-binaries.sh in the next step.
          cargo build --release -p octravpn-client -p octravpn-node -p octravpn-analytics
          echo "${PWD}/target/release" >> "$GITHUB_PATH"

      - name: Build octravpn-builder image (gives the Linux-binary build step a protoc-equipped container)
        run: |
          set -euo pipefail
          # Same fix as render-job. See the light job's identical step
          # at the top of the workflow for the full rationale.
          docker build \
            -f octra/docker/Dockerfile.builder \
            -t octravpn-builder:latest \
            . 2>&1 | tail -8

      - name: Build Linux binaries for fixture containers
        working-directory: octra
        run: |
          set -euo pipefail
          # Canonical entry point for the Linux binaries the heavy
          # bringups bind-mount into their fixture containers:
          # target/linux-debug/debug/{octravpn,octravpn-node,
          # octravpn-analytics,octra-mock-rpc}. Idempotent — sub-second
          # on re-runs.
          bash demo/lib/build-linux-binaries.sh

      - name: Generate audit + receipt-journal fixture (for H6/H7 master-tour)
        if: matrix.group == 'h6' || matrix.group == 'h7'
        working-directory: octra
        run: |
          set -euo pipefail
          # Tape 21 (and 00's audit segment) needs the same synthesized
          # audit fixture the light job builds for tape 03. Replicate
          # it locally since the light job's checkout is on a different
          # runner.
          mkdir -p demo/state/node
          python3 - <<'PY'
          import hmac, hashlib, json, secrets
          state_dir = "demo/state/node"
          key = secrets.token_bytes(32)
          with open(f"{state_dir}/audit.log.key", "wb") as f:
              f.write(key)
          records = [
              (1715000000, "session_open",  "a" * 64, {"peer": "peer-1"}),
              (1715000005, "session_open",  "b" * 64, {"peer": "peer-2"}),
              (1715000020, "bytes_used",    "a" * 64, {"bytes_used": 4096}),
              (1715000040, "receipt_sign",  "a" * 64, {"seq": 1, "bytes_used": 4096}),
              (1715000060, "bytes_used",    "b" * 64, {"bytes_used": 8192}),
              (1715000080, "receipt_sign",  "b" * 64, {"seq": 1, "bytes_used": 8192}),
              (1715000100, "session_close", "a" * 64, {"reason": "client_quit"}),
              (1715000120, "session_close", "b" * 64, {"reason": "client_quit"}),
          ]
          prev_mac = b"\x00" * 32
          with open(f"{state_dir}/audit.log", "w") as f:
              for ts, kind, sid, extra in records:
                  rec = {"ts_unix": ts, "kind": kind, "source": None,
                         "session_id": sid, "extra": extra}
                  canonical = json.dumps(rec, separators=(",", ":"), sort_keys=False)
                  mac = hmac.new(key, prev_mac + canonical.encode(), hashlib.sha256).digest()
                  chained = {"record_json": canonical,
                             "prev_mac": prev_mac.hex(),
                             "mac": mac.hex()}
                  f.write(json.dumps(chained) + "\n")
                  prev_mac = mac
          open(f"{state_dir}/receipts.bin", "wb").close()
          print(f"wrote {len(records)} audit records + empty journal")
          PY
          ls -la demo/state/node/

      - name: Render group ${{ matrix.group }} (${{ matrix.name }})
        working-directory: octra
        run: |
          set -euo pipefail
          mkdir -p demo/recordings

          # Per-tape renderer with preflight gate. PASS => vhs render.
          # FAIL => `::warning::` + continue (preserves the per-tape
          # preflight gate behavior from the previous sequential heavy
          # job — see render_tape() in the light job above).
          render_tape() {
              local tape="$1"
              local skip_preflight="${2:-0}"
              echo "=== ${tape} ==="
              if [[ "${skip_preflight}" != "1" ]]; then
                  if ! bash demo/lib/preflight-tape.sh "${tape}"; then
                      echo "::warning::${tape} failed preflight — skipping vhs render"
                      return 0
                  fi
              fi
              vhs "${tape}" || echo "::warning::${tape} failed vhs render (non-fatal in nightly)"
          }

          echo "--- group: ${{ matrix.name }} (${{ matrix.group }}) ---"

          # Bringup (may be empty for self-bringup groups like H1/H7).
          if [[ -n "${{ matrix.bringup }}" ]]; then
              bash "${{ matrix.bringup }}"
          fi

          # Render each tape in the group. Tape spec is
          # "<file>[:<skip_preflight>]" — skip_preflight defaults to 0.
          for spec in ${{ matrix.tapes }}; do
              tape_file="${spec%%:*}"
              skip="${spec##*:}"
              [[ "${skip}" == "${spec}" ]] && skip="0"
              render_tape "demo/tapes/${tape_file}" "${skip}"
          done

          # Teardown (may be empty).
          if [[ -n "${{ matrix.teardown }}" ]]; then
              bash "${{ matrix.teardown }}" >/dev/null 2>&1 || true
          fi

          ls -la demo/recordings/ || true

      - name: Upload group recordings
        uses: actions/upload-artifact@v4
        with:
          name: demo-recordings-${{ matrix.group }}
          path: octra/demo/recordings/
          if-no-files-found: warn

  # ---------------------------------------------------------------------
  # Aggregator job: pulls every matrix job's artifact, muxes captions +
  # TTS audio across the combined set, and commits once. Runs only after
  # ALL matrix entries finish (success OR failure — `if: always()` so a
  # single group failure doesn't strand the others' recordings).
  # ---------------------------------------------------------------------
  render-heavy-aggregate:
    runs-on: ubuntu-latest
    needs: [render-heavy]
    if: always()
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          path: octra

      - name: Install ffmpeg + espeak-ng (for captions+audio mux)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng jq

      - name: Download all matrix artifacts
        uses: actions/download-artifact@v4
        with:
          # Merge every render-heavy-h<N> artifact into a single dir.
          pattern: demo-recordings-h*
          merge-multiple: true
          path: octra/demo/recordings/

      - name: List combined recordings
        working-directory: octra
        run: |
          set -euo pipefail
          ls -la demo/recordings/ || true

      - name: Mux captions + TTS audio onto combined recordings
        working-directory: octra
        run: |
          set -euo pipefail
          bash demo/lib/render-with-captions.sh || echo "(captioning non-fatal)"
          bash demo/lib/render-with-audio.sh   || echo "(audio non-fatal)"
          ls -la demo/recordings/ || true

      - name: Upload aggregated heavy recordings
        uses: actions/upload-artifact@v4
        with:
          name: demo-recordings-heavy
          path: octra/demo/recordings/
          if-no-files-found: warn

      - name: Commit refreshed recordings back to repo
        working-directory: octra
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain demo/recordings/)" ]]; then
              echo "no recording changes to commit"
              exit 0
          fi
          git config user.name  "octravpn-demo-bot"
          git config user.email "octravpn-demo-bot@users.noreply.github.com"
          git add demo/recordings/
          DATE=$(date -u +%Y-%m-%d)
          TAPES=$(git diff --cached --name-only demo/recordings/ \
                  | grep -Eo '[0-9]{2}-[a-z0-9-]+\.(mp4|gif)' \
                  | sort -u \
                  | tr '\n' ' ')
          git commit -m "ci(demo): refresh recordings ${DATE}" \
                     -m "[skip ci]" \
                     -m "Tapes produced: ${TAPES:-(none)}" \
                     -m "Auto-generated by demo.yml render-heavy matrix aggregator (run ${GITHUB_RUN_ID}). README gifs use relative paths, so this push updates the README inline."
          git pull --rebase origin main || true
          git push origin HEAD:main
