# Nightly + on-demand regeneration of the demo recordings.
#
# This workflow is intentionally separate from ci.yml / fuzz.yml /
# release.yml — it has different secrets, a different cadence, and
# different artefacts. Coordinate with #241 + #243 by adding files,
# never editing the others.
#
# The `render` job covers tapes that need nothing more than the
# octravpn binaries + a synthesized audit fixture + the standalone
# `headscale` CLI. The `render-heavy` job covers tapes that drive
# Docker + the 3-node mesh + the portal (tape 02). See `docs/demo.md`
# for the full per-tape matrix.
#
# Tapes intentionally not rendered in CI: none — every tape in
# `demo/tapes/` is routed to one of the two jobs below. If a tape
# can't render on a runner (e.g. needs a real GUI or a 3rd-party
# service), document that inline next to its entry in the for-loop.

name: demo

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"   # 06:17 UTC nightly

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          path: octravpn

      - name: Checkout sibling repos (octra-foundry, headscale-rs)
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/androolloyd/octra-foundry.git
          git clone --depth 1 https://github.com/androolloyd/headscale-rs.git
          ls -la

      - name: Install vhs + ttyd + ffmpeg + espeak-ng
        run: |
          set -euo pipefail
          sudo apt-get update
          # espeak-ng is the TTS backend used by demo/lib/render-with-audio.sh
          # on linux; on macOS the same script picks up /usr/bin/say.
          sudo apt-get install -y ffmpeg ttyd chromium-browser jq espeak-ng
          VHS_VERSION=$(curl -sL https://api.github.com/repos/charmbracelet/vhs/releases/latest | jq -r .tag_name)
          curl -sL "https://github.com/charmbracelet/vhs/releases/download/${VHS_VERSION}/vhs_${VHS_VERSION#v}_amd64.deb" -o /tmp/vhs.deb
          sudo dpkg -i /tmp/vhs.deb
          vhs --version

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build octravpn binaries needed by tapes
        working-directory: octravpn
        run: |
          set -euo pipefail
          cargo build --release -p octravpn-client -p octravpn-node
          echo "${PWD}/target/release" >> "$GITHUB_PATH"

      - name: Build + install standalone headscale CLI (sibling repo)
        run: |
          set -euo pipefail
          # Tape 07 (`headscale-cli`) drives the standalone `headscale`
          # binary from the headscale-rs sibling — installing into
          # /usr/local/bin keeps the parity-with-upstream story
          # (same CLI, same surface) that the demo tour leans on.
          if [[ -d headscale-rs/headscale-cli ]]; then
              cargo install --path headscale-rs/headscale-cli --bin headscale --root /usr/local --force
          elif [[ -d headscale-rs ]]; then
              # Layout fallback — newer headscale-rs checkouts may have
              # the bin at the workspace root.
              cargo install --path headscale-rs --bin headscale --root /usr/local --force || \
                  echo "headscale build failed (tape 07 will skip)"
          else
              echo "headscale-rs sibling not cloned; tape 07 will skip"
          fi
          command -v headscale || true
          headscale --version || true

      - name: Generate audit + receipt-journal fixture for tape 03
        working-directory: octravpn
        run: |
          set -euo pipefail
          # Tape 03 (`audit-replay`) pins these paths:
          #   demo/state/node/audit.log
          #   demo/state/node/receipts.bin
          # Synthesize a small HMAC-chained audit log + an empty
          # receipt journal so `octravpn-node audit replay` has
          # something to render. The replay path is lenient (skip
          # bad lines, accept empty journal), so we don't need a
          # full daemon roundtrip — just well-formed JSONL.
          mkdir -p demo/state/node
          python3 - <<'PY'
          import hmac, hashlib, json, os, secrets
          state_dir = "demo/state/node"
          key = secrets.token_bytes(32)
          # Sibling key so `audit verify` has a chance too (it walks
          # `<audit_path>.key` for the file-case lookup).
          with open(f"{state_dir}/audit.log.key", "wb") as f:
              f.write(key)
          records = [
              (1715000000, "session_open",  "a" * 64, {"peer": "peer-1"}),
              (1715000005, "session_open",  "b" * 64, {"peer": "peer-2"}),
              (1715000020, "bytes_used",    "a" * 64, {"bytes_used": 4096}),
              (1715000040, "receipt_sign",  "a" * 64, {"seq": 1, "bytes_used": 4096}),
              (1715000060, "bytes_used",    "b" * 64, {"bytes_used": 8192}),
              (1715000080, "receipt_sign",  "b" * 64, {"seq": 1, "bytes_used": 8192}),
              (1715000100, "session_close", "a" * 64, {"reason": "client_quit"}),
              (1715000120, "session_close", "b" * 64, {"reason": "client_quit"}),
          ]
          prev_mac = b"\x00" * 32
          with open(f"{state_dir}/audit.log", "w") as f:
              for ts, kind, sid, extra in records:
                  rec = {
                      "ts_unix": ts,
                      "kind": kind,
                      "source": None,
                      "session_id": sid,
                      "extra": extra,
                  }
                  canonical = json.dumps(rec, separators=(",", ":"), sort_keys=False)
                  mac = hmac.new(key, prev_mac + canonical.encode(), hashlib.sha256).digest()
                  chained = {
                      "record_json": canonical,
                      "prev_mac": prev_mac.hex(),
                      "mac": mac.hex(),
                  }
                  f.write(json.dumps(chained) + "\n")
                  prev_mac = mac
          # Empty journal file — replay tolerates this and renders
          # only the audit-derived rows. A future tape revision can
          # swap this for a real ReceiptJournal::bump-built fixture.
          open(f"{state_dir}/receipts.bin", "wb").close()
          print(f"wrote {len(records)} audit records + empty journal")
          PY
          ls -la demo/state/node/

      - name: Render dependency-light tapes
        working-directory: octravpn
        run: |
          set -euo pipefail
          mkdir -p demo/recordings
          # Tapes 01 + 04 drive the octravpn / octravpn-node binaries
          # (built above). Tape 03 reads the synthesized audit fixture.
          # Tape 07 drives the standalone `headscale` binary from the
          # headscale-rs sibling (installed above). Tapes 11..16 are
          # narration-shape (CLI surfaces only) and need only the
          # octravpn binaries.
          #
          # Tape 02 (portal-fetch) is routed to render-heavy because
          # start-portal.sh requires a pre-existing chain-backed
          # config; it is not self-bootstrapping.
          for tape in demo/tapes/01-*.tape \
                     demo/tapes/03-*.tape \
                     demo/tapes/04-*.tape \
                     demo/tapes/07-*.tape \
                     demo/tapes/11-*.tape \
                     demo/tapes/12-*.tape \
                     demo/tapes/13-*.tape \
                     demo/tapes/14-*.tape \
                     demo/tapes/15-*.tape \
                     demo/tapes/16-*.tape; do
              echo "=== ${tape} ==="
              vhs "${tape}" || echo "  ! ${tape} failed (non-fatal in nightly)"
          done
          ls -la demo/recordings/ || true

      - name: Mux captions + TTS audio onto light recordings
        working-directory: octravpn
        run: |
          set -euo pipefail
          # The .vtt files live under demo/recordings/ as siblings of
          # the .mp4 files (hand-authored; see docs/demo.md §Captions).
          # Mux them in + synthesize a narrator track via espeak-ng.
          bash demo/lib/render-with-captions.sh || echo "(captioning non-fatal)"
          bash demo/lib/render-with-audio.sh   || echo "(audio non-fatal)"
          ls -la demo/recordings/ || true

      - name: Upload recordings
        uses: actions/upload-artifact@v4
        with:
          name: demo-recordings
          path: octravpn/demo/recordings/
          if-no-files-found: warn

      - name: Commit refreshed recordings back to repo (light job)
        working-directory: octravpn
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain demo/recordings/)" ]]; then
              echo "no recording changes to commit"
              exit 0
          fi
          git config user.name  "octravpn-demo-bot"
          git config user.email "octravpn-demo-bot@users.noreply.github.com"
          git add demo/recordings/
          DATE=$(date -u +%Y-%m-%d)
          # Enumerate the tapes this run actually produced so the
          # commit log is auditable without crawling the action output.
          TAPES=$(git diff --cached --name-only demo/recordings/ \
                  | grep -Eo '[0-9]{2}-[a-z0-9-]+\.(mp4|gif)' \
                  | sort -u \
                  | tr '\n' ' ')
          git commit -m "ci(demo): refresh light recordings ${DATE}" \
                     -m "[skip ci]" \
                     -m "Tapes produced: ${TAPES:-(none)}" \
                     -m "Auto-generated by demo.yml render job (run ${GITHUB_RUN_ID})."
          # Light job may race the heavy job's push; rebase + retry once.
          git pull --rebase origin main || true
          git push origin HEAD:main

  # ---------------------------------------------------------------------
  # Heavy job: render tapes 08/09/10 which drive the full
  # docker-compose.mesh-demo.yml stack (3 stock tailscale clients +
  # mesh-control + derp-1 + analytics). Same docker-compose flow the
  # tailscale-interop test (Wall 7) drives in CI, scaled to 3 peers.
  #
  # The job is intentionally separate from the dependency-light job
  # above so a docker-daemon hiccup on the runner can't break the
  # nightly tapes 01/04 rendering.
  # ---------------------------------------------------------------------
  render-heavy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          path: octravpn

      - name: Checkout sibling repos
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/androolloyd/octra-foundry.git
          git clone --depth 1 https://github.com/androolloyd/headscale-rs.git
          ls -la

      - name: Install vhs + jq + openssl + espeak-ng
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd chromium-browser jq openssl espeak-ng
          VHS_VERSION=$(curl -sL https://api.github.com/repos/charmbracelet/vhs/releases/latest | jq -r .tag_name)
          curl -sL "https://github.com/charmbracelet/vhs/releases/download/${VHS_VERSION}/vhs_${VHS_VERSION#v}_amd64.deb" -o /tmp/vhs.deb
          sudo dpkg -i /tmp/vhs.deb
          vhs --version

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build octravpn-node + analytics (debug for compose mount + release for host CLI)
        working-directory: octravpn
        run: |
          set -euo pipefail
          # Two builds because the docker-compose.mesh-demo.yml bind-mounts
          # target/linux-debug/debug/* into the containers, while the host
          # tape uses target/release/octravpn-node for the `mesh status`
          # CLI invocation. The release build is faster to cargo-incremental
          # so we do it second.
          cargo build -p octravpn-node -p octravpn-analytics
          mkdir -p target/linux-debug/debug
          cp target/debug/octravpn-node target/linux-debug/debug/
          cp target/debug/octravpn-analytics target/linux-debug/debug/
          cargo build --release -p octravpn-node -p octravpn-analytics
          echo "${PWD}/target/release" >> "$GITHUB_PATH"

      - name: Render heavy tapes (each tape's failure is non-fatal)
        working-directory: octravpn
        run: |
          set -euo pipefail
          mkdir -p demo/recordings
          # Tapes 17..22 + the master tour all depend on the mesh +
          # chain fixtures the 3node-mesh-bringup.sh helper installs.
          # Tape 02 (portal-fetch) requires a chain-backed config at
          # demo/state/portal/config.toml — best-effort here; the
          # tape's `Source` directive will surface the missing-config
          # error if no fixture is present.
          # Tape 06 (tailscale-interop) drives docker-compose +
          # openssl + both sibling repos; the heavy runner already
          # has all three.
          # We do a best-effort teardown between tapes so a bad
          # bringup in tape N doesn't poison tape N+1.
          for tape in demo/tapes/02-portal-fetch.tape \
                     demo/tapes/05-v3-smoke.tape \
                     demo/tapes/06-tailscale-interop.tape \
                     demo/tapes/08-3node-mesh.tape \
                     demo/tapes/09-traffic-patterns.tape \
                     demo/tapes/10-metrics-grafana.tape \
                     demo/tapes/17-operator-onboarding.tape \
                     demo/tapes/18-tailnet-owner-policy.tape \
                     demo/tapes/19-circle-update-atomic.tape \
                     demo/tapes/20-pvac-rotation.tape \
                     demo/tapes/21-audit-verify.tape \
                     demo/tapes/22-headscale-cli-tour.tape \
                     demo/tapes/00-master-tour.tape; do
              echo "=== ${tape} ==="
              bash demo/lib/3node-mesh-teardown.sh >/dev/null 2>&1 || true
              vhs "${tape}" || echo "  ! ${tape} failed (non-fatal in nightly)"
          done
          bash demo/lib/3node-mesh-teardown.sh >/dev/null 2>&1 || true
          ls -la demo/recordings/ || true

      - name: Mux captions + TTS audio onto heavy recordings
        working-directory: octravpn
        run: |
          set -euo pipefail
          bash demo/lib/render-with-captions.sh || echo "(captioning non-fatal)"
          bash demo/lib/render-with-audio.sh   || echo "(audio non-fatal)"
          ls -la demo/recordings/ || true

      - name: Upload heavy recordings
        uses: actions/upload-artifact@v4
        with:
          name: demo-recordings-heavy
          path: octravpn/demo/recordings/
          if-no-files-found: warn

      - name: Commit refreshed recordings back to repo
        working-directory: octravpn
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain demo/recordings/)" ]]; then
              echo "no recording changes to commit"
              exit 0
          fi
          git config user.name  "octravpn-demo-bot"
          git config user.email "octravpn-demo-bot@users.noreply.github.com"
          git add demo/recordings/
          DATE=$(date -u +%Y-%m-%d)
          TAPES=$(git diff --cached --name-only demo/recordings/ \
                  | grep -Eo '[0-9]{2}-[a-z0-9-]+\.(mp4|gif)' \
                  | sort -u \
                  | tr '\n' ' ')
          git commit -m "ci(demo): refresh recordings ${DATE}" \
                     -m "[skip ci]" \
                     -m "Tapes produced: ${TAPES:-(none)}" \
                     -m "Auto-generated by demo.yml render-heavy job (run ${GITHUB_RUN_ID}). README gifs use relative paths, so this push updates the README inline."
          git pull --rebase origin main || true
          git push origin HEAD:main
