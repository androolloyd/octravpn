# OctraVPN production release pipeline.
#
# Triggered on annotated tag pushes matching `v*` (e.g. `v0.1.0`).
# Builds Linux x86_64 + aarch64 release binaries for octravpn-node +
# octravpn-client, packages them as signed deb + rpm + tarball
# artifacts, and publishes a DRAFT GitHub release with all artifacts
# attached. The draft is published manually after operator review.
#
# Out of scope (deferred):
#   - Windows / macOS artifacts. See deploy/macos-pkg + deploy/windows
#     for the historical workflow; cross-compile setup is a follow-up.
#   - OCI container images. ghcr.io publishing lives in a separate
#     workflow when we want it.
#   - crates.io publishing. Intentionally not wired — operators install
#     packages, not crates.
#
# GPG signing:
#   The `sign` block is OFF by default (gated on the RELEASE_GPG_KEY
#   secret being present). To enable, populate two repo secrets:
#     - RELEASE_GPG_KEY:        base64-encoded ASCII-armored private key
#                               (output of `gpg --armor --export-secret-keys $KEY_ID | base64`)
#     - RELEASE_GPG_PASSPHRASE: passphrase for that key
#   See docs/release.md for the full procedure.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build & package ${{ matrix.target }}
    runs-on: ubuntu-latest
    env:
      # Materialise the signing secret at job scope so the per-step
      # `if:` below can gate on `env.RELEASE_GPG_KEY`. GitHub Actions
      # forbids `secrets.*` inside `if:` expressions; the workaround
      # is to bounce through env. The secret value is still masked
      # in logs — `env:` doesn't change that.
      RELEASE_GPG_KEY: ${{ secrets.RELEASE_GPG_KEY }}
      RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cross: false
          - target: aarch64-unknown-linux-gnu
            cross: true

    # The workspace path-depends on sibling repos. Mirror the cross-
    # repo checkout layout the project uses elsewhere — `octra/` for
    # this repo, `octra-foundry/` and `headscale-rs/` alongside — and
    # run cargo from inside `octra/`. The setup-rust composite action
    # at `.github/actions/setup-rust` is documented around this same
    # layout.
    defaults:
      run:
        working-directory: octra

    steps:
      - name: Checkout octra
        uses: actions/checkout@v4
        with:
          path: octra
          fetch-depth: 0  # need full history for the changelog step
      - name: Checkout octra-foundry
        uses: actions/checkout@v4
        with:
          repository: androolloyd/octra-foundry
          path: octra-foundry
      - name: Checkout headscale-rs
        uses: actions/checkout@v4
        with:
          repository: androolloyd/headscale-rs
          path: headscale-rs

      - name: Install Rust toolchain
        # Matches the existing CI lane (`.github/actions/setup-rust`,
        # default `toolchain: stable`). When `rust-toolchain.toml`
        # pins a specific version cargo will pull that version on
        # first invocation; the `stable` channel installed here just
        # bootstraps the toolchain manager and the cross target.
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          # Save the cache even on failure so a retry doesn't rebuild
          # the whole world.
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Cache cargo-deb + cargo-generate-rpm binaries
        id: cargo-tools-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-deb
            ~/.cargo/bin/cargo-generate-rpm
          # Versions pinned so a cache rebuild is deterministic; bump
          # the suffix when upgrading the packagers.
          key: cargo-tools-deb3.7-rpm0.16

      - name: Install cargo-deb + cargo-generate-rpm
        if: steps.cargo-tools-cache.outputs.cache-hit != 'true'
        run: |
          cargo install cargo-deb --locked --version ^3.7
          cargo install cargo-generate-rpm --locked --version ^0.16

      - name: Install cross-toolchain (aarch64 only)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          mkdir -p .cargo
          # Tell cargo where the aarch64 linker is. We append rather
          # than overwrite so a developer's local config keeps working.
          {
            echo ""
            echo "[target.aarch64-unknown-linux-gnu]"
            echo "linker = \"aarch64-linux-gnu-gcc\""
          } >> .cargo/config.toml

      - name: Compute version
        id: version
        run: |
          # Strip the `v` prefix off the tag for use in artifact names.
          # GITHUB_REF on a tag push is `refs/tags/v0.1.0`.
          REF="${GITHUB_REF#refs/tags/}"
          VERSION="${REF#v}"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building release for ${REF} (version ${VERSION})"

      - name: cargo build --release
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            -p octravpn-node -p octravpn-client

      - name: cargo deb (octravpn-node)
        run: |
          cargo deb \
            -p octravpn-node \
            --target ${{ matrix.target }} \
            --no-build

      - name: cargo generate-rpm (octravpn-node)
        run: |
          cargo generate-rpm \
            -p octravpn-node \
            --target ${{ matrix.target }}

      - name: tarball (node + client binaries)
        id: tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          STAGE="octravpn-${VERSION}-${TARGET}"
          mkdir -p "dist/${STAGE}"
          cp "target/${TARGET}/release/octravpn-node" "dist/${STAGE}/"
          cp "target/${TARGET}/release/octravpn"      "dist/${STAGE}/octravpn-client"
          cp README.md LICENSE* "dist/${STAGE}/" 2>/dev/null || true
          tar -C dist -czf "dist/${STAGE}.tar.gz" "${STAGE}"
          rm -rf "dist/${STAGE}"
          echo "tarball=dist/${STAGE}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Collect artifacts
        id: collect
        run: |
          mkdir -p dist
          # .deb lives under target/<triple>/debian/ when --target is set;
          # cargo-deb may also dump into target/debian/ depending on
          # version. Glob both so we don't care which.
          find target -path "*/debian/*.deb" -exec cp {} dist/ \;
          find target -path "*/generate-rpm/*.rpm" -exec cp {} dist/ \;
          ls -lah dist/
          echo "Artifacts staged under ./dist/"

      - name: GPG sign artifacts (skipped if no key configured)
        # `env.RELEASE_GPG_KEY` is the job-scoped materialisation of
        # `secrets.RELEASE_GPG_KEY` (see the `env:` block at the job
        # level). When the secret is unset the env var resolves to
        # an empty string and the entire step is skipped, so the
        # workflow stays green on a key-less repo.
        if: ${{ env.RELEASE_GPG_KEY != '' }}
        run: |
          set -euo pipefail
          # Decode the base64'd private key into a temp file and
          # import. Don't leave the plaintext key on disk after import.
          KEYFILE="$(mktemp)"
          trap 'rm -f "$KEYFILE"' EXIT
          echo "$RELEASE_GPG_KEY" | base64 -d > "$KEYFILE"
          gpg --batch --yes --import "$KEYFILE"
          KEYID="$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/ {print $5; exit}')"
          echo "Signing with key ${KEYID}"
          for artifact in dist/*; do
            # Skip already-signed sidecars on a retry.
            case "$artifact" in *.sig|*.asc|*.sha256) continue ;; esac
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "$RELEASE_GPG_PASSPHRASE" \
                --local-user "$KEYID" \
                --detach-sign --armor \
                --output "${artifact}.sig" \
                "$artifact"
          done
          ls -lah dist/

      - name: Generate SHA256SUMS
        run: |
          cd dist
          # Stable lexicographic ordering matches deploy/CHECKSUMS.md.template.
          sha256sum $(ls | grep -v '\.sha256$' | sort) > SHA256SUMS-${{ matrix.target }}
          cat SHA256SUMS-${{ matrix.target }}

      - name: Upload matrix artifacts
        # `actions/upload-artifact` doesn't honour
        # `defaults.run.working-directory`, so the path needs to be
        # explicit relative to the runner's $GITHUB_WORKSPACE root.
        uses: actions/upload-artifact@v4
        with:
          name: octravpn-${{ matrix.target }}
          path: octra/dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish draft release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout (for changelog)
        uses: actions/checkout@v4
        with:
          # `fetch-depth: 0` so the changelog step has access to the
          # previous release tag and the commits between it and HEAD.
          fetch-depth: 0

      - name: Download all matrix artifacts
        uses: actions/download-artifact@v4
        with:
          # Merge x86_64 + aarch64 outputs into a single dist/.
          # Per-target SHA256SUMS-<target> filenames don't collide;
          # the deb/rpm/tarball filenames embed the target arch.
          path: dist
          pattern: octravpn-*
          merge-multiple: true

      - name: Consolidate SHA256SUMS
        run: |
          cd dist
          # Merge per-target SHA256SUMS into a single file. Each line is
          # `<hash>  <filename>`; sort by filename for deterministic
          # output that matches deploy/CHECKSUMS.md.template.
          cat SHA256SUMS-* | sort -k2 > SHA256SUMS
          rm -f SHA256SUMS-*
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS
          ls -lah .

      - name: Draft changelog
        id: changelog
        run: |
          # Discover the previous release tag (anything matching v*
          # that isn't the current one). If none exists this is the
          # first release and we list every commit.
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG="$(git tag --list 'v*' --sort=-version:refname \
                       | grep -v "^${CURRENT_TAG}$" | head -n1 || true)"
          {
            echo "## OctraVPN ${CURRENT_TAG}"
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "Changes since [\`${PREV_TAG}\`](https://github.com/${GITHUB_REPOSITORY}/releases/tag/${PREV_TAG}):"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${PREV_TAG}..HEAD"
            else
              echo "Initial release."
              echo
              git log --no-merges --pretty=format:'- %s (%h)' HEAD
            fi
            echo
            echo
            echo "## Artifacts"
            echo
            echo "Linux x86_64 + aarch64 builds: deb, rpm, tarball. See"
            echo "\`SHA256SUMS\` for hashes and \`docs/release.md\` for"
            echo "signature verification."
            echo
            echo "## Verification"
            echo
            echo "\`\`\`"
            echo "sha256sum -c SHA256SUMS"
            echo "gpg --verify octravpn-${CURRENT_TAG#v}-x86_64-unknown-linux-gnu.tar.gz.sig"
            echo "\`\`\`"
          } > CHANGELOG.md
          {
            echo 'body<<EOF_CHANGELOG'
            cat CHANGELOG.md
            echo
            echo 'EOF_CHANGELOG'
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          # Operator manually flips draft=false after reviewing the
          # generated notes + artifact list.
          draft: true
          prerelease: false
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.sig
            dist/SHA256SUMS
