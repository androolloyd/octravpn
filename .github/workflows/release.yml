name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip
            cross: true
    steps:
      - uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (aarch64 linux / arm64 windows)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cargo)
        if: '!matrix.cross'
        run: |
          cargo build --release --target ${{ matrix.target }} -p octravpn-client
          cargo build --release --target ${{ matrix.target }} -p octravpn-node

      - name: Build (cross)
        if: matrix.cross
        run: |
          cross build --release --target ${{ matrix.target }} -p octravpn-client
          cross build --release --target ${{ matrix.target }} -p octravpn-node

      - name: Stage artifacts
        shell: bash
        run: |
          STAGE="octravpn-${GITHUB_REF##*/v}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
              cp "target/${{ matrix.target }}/release/octravpn.exe" "$STAGE/"
              cp "target/${{ matrix.target }}/release/octravpn-node.exe" "$STAGE/"
              cp deploy/windows/install-service.ps1 "$STAGE/"
              cp deploy/windows/uninstall-service.ps1 "$STAGE/"
          else
              cp "target/${{ matrix.target }}/release/octravpn" "$STAGE/"
              cp "target/${{ matrix.target }}/release/octravpn-node" "$STAGE/"
          fi
          cp README.md LICENSE* "$STAGE/" 2>/dev/null || true
          cp -r docs "$STAGE/"
          echo "STAGE=$STAGE" >> $GITHUB_ENV

      - name: Package tar.gz
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: tar -C . -czf "$STAGE.tar.gz" "$STAGE"

      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path $env:STAGE -DestinationPath "$env:STAGE.zip" -CompressionLevel Optimal

      - name: Hash
        shell: bash
        run: |
          shopt -s nullglob
          for f in "$STAGE".tar.gz "$STAGE".zip; do
              if [ "${{ matrix.os }}" = "windows-latest" ]; then
                  pwsh -c "Get-FileHash -Algorithm SHA256 $f | ForEach-Object Hash" > "$f.sha256"
              else
                  shasum -a 256 "$f" | awk '{print $1}' > "$f.sha256"
              fi
          done

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.STAGE }}.tar.gz
            ${{ env.STAGE }}.zip
            ${{ env.STAGE }}.tar.gz.sha256
            ${{ env.STAGE }}.zip.sha256

  deb:
    name: cargo-deb (linux)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: ./.github/actions/setup-rust
        with:
          cache: "false"
      - run: cargo install cargo-deb --locked
      - run: cargo deb -p octravpn-node --no-build
      - run: cargo deb -p octravpn-client --no-build
      - uses: softprops/action-gh-release@v2
        with:
          files: target/debian/*.deb

  rpm:
    name: cargo-generate-rpm (linux)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: ./.github/actions/setup-rust
        with:
          cache: "false"
      - run: cargo install cargo-generate-rpm --locked
      - run: cargo generate-rpm -p octravpn-node
      - run: cargo generate-rpm -p octravpn-client
      - uses: softprops/action-gh-release@v2
        with:
          files: target/generate-rpm/*.rpm

  macos-pkg:
    name: macOS .pkg
    runs-on: macos-14
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "octravpn-*-apple-darwin*"
          path: artifacts
      - name: Stage universal binary
        run: |
          mkdir -p target/x86_64-apple-darwin/release target/aarch64-apple-darwin/release
          tar -xzf artifacts/*x86_64-apple-darwin*/*.tar.gz -C /tmp || true
          tar -xzf artifacts/*aarch64-apple-darwin*/*.tar.gz -C /tmp || true
          cp /tmp/octravpn-*/octravpn       target/x86_64-apple-darwin/release/   2>/dev/null || true
          cp /tmp/octravpn-*/octravpn-node  target/x86_64-apple-darwin/release/   2>/dev/null || true
      - name: Build pkg
        env:
          VERSION: ${{ github.ref_name }}
          DEVELOPER_ID_INSTALLER: ${{ secrets.DEVELOPER_ID_INSTALLER }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: ./deploy/macos-pkg/build-pkg.sh
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/octravpn-*.pkg

  windows-msi:
    name: Windows .msi
    runs-on: windows-latest
    needs: build
    steps:
      - uses: ./.github/actions/setup-rust
      - run: cargo install cargo-wix --locked
      - run: cargo build --release -p octravpn-client -p octravpn-node
      - run: cargo wix --no-build --nocapture --package octravpn-client
      - uses: softprops/action-gh-release@v2
        with:
          files: target/wix/*.msi

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: ./.github/actions/setup-rust
        with:
          cache: "false"
      - run: cargo install cargo-cyclonedx --locked
      - run: cargo cyclonedx --format json --output-pattern package
      - name: Collect SBOMs
        run: |
          mkdir -p sbom
          find . -name '*.cdx.json' -exec cp {} sbom/ \;
      - uses: softprops/action-gh-release@v2
        with:
          files: sbom/*.cdx.json

  oci:
    name: OCI container image
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push (node)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.node
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/octravpn-node:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/octravpn-node:latest
      - name: Build + push (client)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.client
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/octravpn:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/octravpn:latest
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign images (keyless via Fulcio)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/octravpn-node:${{ github.ref_name }}
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/octravpn:${{ github.ref_name }}

  homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: build
    # GitHub Actions forbids `secrets.*` in job-level `if`; gate the
    # tap update at step level via env instead.
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Update tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: |
          echo "Homebrew formula update would happen here using $HOMEBREW_TAP_TOKEN."
          # In practice: git clone the homebrew-tap repo, run a sed against
          # Formula/octravpn.rb to bump url+sha256, commit, push.
