# v4 relay-settlement daemon end-to-end against REAL devnet.
#
# This lane gates the layer unit/integration tests can't reach: the actual
# octravpn-node / octravpn-client daemons talking to live Octra devnet. Every
# bug it caught on 2026-07-04 (nonce off-by-one, event-less admission, float /
# zero tx timestamps) passed the whole mock-based suite and only fell out here.
# The `devnet_rpc_contract` unit test guards the response *shapes*; this proves
# the daemons actually settle a relay session on-chain.
#
# NOT a per-PR gate: it needs docker, live devnet, ~15 min (the builder compiles
# the daemons), and a funded wallet. It runs weekly + on demand.
#
# REQUIRED SECRET: OCTRA_DEVNET_DEPLOYER_KEY — a devnet wallet secret (the 64-hex
# or raw-bytes contents of a deployer.key) funded with enough OCT to deploy
# main-v4 and fund two fresh test wallets (~5 OCT is plenty). The job funds a
# fresh node1 + client wallet from it each run, so only this one key is needed.
# If the secret is absent the job self-skips (green no-op) rather than failing.
name: v4-relay-devnet-e2e

on:
  workflow_dispatch: {}
  schedule:
    # Mondays 07:00 UTC — weekly heartbeat over the daemon settlement path.
    - cron: "0 7 * * 1"

concurrency:
  group: v4-relay-devnet-e2e
  cancel-in-progress: false

jobs:
  daemon-e2e:
    name: v4 relay daemon smoke (devnet)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OCTRA_RPC_URL: "https://devnet.octrascan.io/rpc"
    steps:
      - uses: actions/checkout@v4
        with: { path: octra }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/octra-foundry, path: octra-foundry }
      - uses: actions/checkout@v4
        with: { repository: androolloyd/headscale-rs, path: headscale-rs }

      - name: Gate on the deployer secret
        id: gate
        run: |
          if [ -z "${{ secrets.OCTRA_DEVNET_DEPLOYER_KEY }}" ]; then
            echo "OCTRA_DEVNET_DEPLOYER_KEY not set — skipping the devnet daemon e2e."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install protobuf compiler (headscale-api build.rs)
        if: steps.gate.outputs.run == 'true'
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends protobuf-compiler libprotobuf-dev

      - uses: dtolnay/rust-toolchain@stable
        if: steps.gate.outputs.run == 'true'

      - name: Build the octra foundry CLI
        if: steps.gate.outputs.run == 'true'
        working-directory: octra-foundry
        run: cargo build --release -p octra-cli

      - name: Bootstrap + fund fresh node1 / client wallets from the deployer
        if: steps.gate.outputs.run == 'true'
        working-directory: octra
        env:
          OCTRA_BIN: ${{ github.workspace }}/octra-foundry/target/release/octra
        run: |
          set -euo pipefail
          mkdir -p docker/devnet/state/node1 docker/devnet/state/client
          # Deployer key from the secret (foundry accepts raw-hex or raw bytes).
          printf '%s' "${{ secrets.OCTRA_DEVNET_DEPLOYER_KEY }}" > docker/devnet/state/deployer.key
          chmod 600 docker/devnet/state/deployer.key
          DEP=$("$OCTRA_BIN" cast wallet addr --key docker/devnet/state/deployer.key)
          echo "deployer: $DEP"
          # Fresh test wallets each run (avoids cross-run nonce/state coupling).
          "$OCTRA_BIN" cast wallet new --out docker/devnet/state/node1/wallet.key
          "$OCTRA_BIN" cast wallet new --out docker/devnet/state/client/wallet.key
          N1=$("$OCTRA_BIN" cast wallet addr --key docker/devnet/state/node1/wallet.key)
          CL=$("$OCTRA_BIN" cast wallet addr --key docker/devnet/state/client/wallet.key)
          echo "node1: $N1 | client: $CL"
          # Fund: node1 needs the circle stake (~1 OCT) + fees; client needs
          # tailnet + session deposits. Overshoot; the deployer holds the float.
          rpc(){ curl -s -m 15 -X POST "$OCTRA_RPC_URL" -H 'content-type: application/json' -d "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"$1\",\"params\":$2}"; }
          fund(){ "$OCTRA_BIN" cast send --key docker/devnet/state/deployer.key --rpc-url "$OCTRA_RPC_URL" --fee 1000 --value "$2" "$1" \
                    | grep -oE '"tx_hash":\s*"[a-f0-9]+"' | head -1 | sed 's/.*"\([a-f0-9]*\)"/\1/'; }
          wait_tx(){ for _ in $(seq 1 25); do sleep 3; s=$(rpc octra_transaction "[\"$1\"]" | python3 -c 'import json,sys;print((json.load(sys.stdin).get("result") or {}).get("status",""))'); case "$s" in confirmed) return 0;; failed|rejected) echo "fund $1 -> $s"; return 1;; esac; done; }
          T1=$(fund "$N1" 300000000); echo "fund node1 tx=$T1";  wait_tx "$T1"
          T2=$(fund "$CL"  80000000); echo "fund client tx=$T2"; wait_tx "$T2"

      - name: Run the v4 relay daemon e2e
        if: steps.gate.outputs.run == 'true'
        working-directory: octra
        env:
          OCTRA_BIN: ${{ github.workspace }}/octra-foundry/target/release/octra
        run: bash docker/devnet/v4-relay-e2e.sh
