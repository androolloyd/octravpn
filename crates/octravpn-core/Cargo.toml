[package]
name = "octravpn-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "Shared types, Octra JSON-RPC client, crypto, and receipt formats for OctraVPN."

[dependencies]
anyhow      = { workspace = true }
async-trait = { workspace = true }
base64      = { workspace = true }
ed25519-dalek = { workspace = true }
hex         = { workspace = true }
rand        = { workspace = true }
reqwest     = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
serde_with  = { workspace = true }
sha2        = { workspace = true }
thiserror   = { workspace = true }
tokio       = { workspace = true }
tracing     = { workspace = true }
zeroize     = { workspace = true }

# Real crypto for commits, FHE, onion
curve25519-dalek = { workspace = true }
chacha20poly1305 = { workspace = true }
hkdf            = { workspace = true }
x25519-dalek    = { workspace = true }
num-bigint-dig  = { workspace = true }
num-integer     = { workspace = true }
num-traits      = { workspace = true }
subtle          = { workspace = true }

[lints]
workspace = true

[features]
default = []
# Enabling `kani` switches in stub host calls so harnesses can run without
# network or crypto-backend dependencies.
kani = []

[dev-dependencies]
proptest = { workspace = true }
tempfile = { workspace = true }
