SPECIFICATION Spec

\* Tightened constants so TLC terminates in seconds. The v2 state
\* space is smaller than v1.1 because the slim registry removes
\* `endpoints`, `update_endpoint`, `rotate_keys`, and replaces
\* `configure_tailnet_exit`'s independent action with the
\* circle-keyed `authorize_circle` whose precondition forces the
\* registry into a non-trivial shape before authorization fires.
\*
\* Constants:
\*   - 1 circle, 1 tailnet, 1 client → exhaustive register/bond/
\*     authorize/open/settle path coverage with no combinatorial
\*     blowup.
\*   - Two payloads exercise distinct-payload equivocation.
\*   - 1 token hash exercises commit + redeem + uniqueness.
\*   - MinCircleStake = 1 to keep the state numerically tractable
\*     (the Lean theorems carry the real-world bound 1e8 lamports;
\*     here we only need the relative shape).

CONSTANTS
    Circles             = {ck1}
    Tailnets            = {t1}
    Clients             = {c1}
    Owner               = c1
    MinDeposit          = 1
    MinTailnetDeposit   = 2
    MinCircleStake      = 1
    Price               = 1
    MaxSeq              = 2
    TokenHashes         = {h1}
    Payloads            = {p1, p2}
    UnbondGrace         = 1
    SweepGrace          = 1

INVARIANTS
    ConservationOfFunds
    NoDoubleSettle
    TreasuryNonNegative
    EarningsNonNegative
    ProgramTreasuryMonotone
    ActiveCirclesAreBonded
    SlashedHaveZeroStake
    Inv_SlashedCircleHasZeroStake
    Inv_SettlementOnlyOnConfirm
    Inv_EquivocationCausesRefund
    Inv_TokenSinglyRedeemed
    Inv_DoubleSignSlashable
    Inv_CircleAtomicRegisterBond
    Inv_AuthorizedCircleIsActive
    Inv_StampedPriceImmutableInOpenSession
    Inv_TreasuryConservation
    Inv_PausedIsBool

CONSTRAINT
    StateBound

\* Liveness is out of scope (same posture as v1.1). Permissionless
\* sweep gives eventual deposit return, but that's an economic
\* property, not a chain-enforced one. The Lean lemmas prove the
\* mutator side: if a settle / no-show / sweep fires, the funds
\* reach the tailnet treasury or the operator's earnings.
