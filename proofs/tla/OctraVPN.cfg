SPECIFICATION Spec

\* Tightened constants so TLC terminates in seconds. The state
\* space here is small enough to exhaustively model-check all
\* safety invariants. Liveness is out of scope (see note below).
\*
\* Two Payloads are enough to exercise distinct-payload
\* equivocation; adding more multiplies the state space without
\* adding new behaviour. Each operator's `signed_payloads` set has
\* 2^|Payloads| values; with 1 endpoint and 2 payloads that's 4.
CONSTANTS
    Endpoints           = {e1}
    Tailnets            = {t1}
    Clients             = {c1}
    Owner               = c1
    MinDeposit          = 1
    MinTailnetDeposit   = 2
    MinEndpointStake    = 2
    MaxSeq              = 2
    TokenHashes         = {h1}
    Payloads            = {p1, p2}

INVARIANTS
    Invariants

CONSTRAINT
    StateBound

\* Liveness_SettleOrRefund requires fairness annotations to hold —
\* in v1 we rely on `sweep_expired_session` (a permissionless
\* fallback) for eventual deposit return, which is an economic
\* property, not a chain-enforced one. The Lean lemmas prove that
\* IF a settle/no-show/sweep fires, the deposit reaches the
\* tailnet treasury. Pure liveness (that one of them MUST fire)
\* is out of scope for the AML state-machine spec.
\*
\* PROPERTIES
\*     Liveness_SettleOrRefund
