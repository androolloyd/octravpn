# Tailscale-interop test harness.
#
# Brings up a minimum-viable OctraVPN mesh control surface plus two
# stock `tailscale/tailscale:latest` containers. The peer harness
# (`run-interop.sh`) drives them through the canonical join + ping
# flow and exits with one of the codes documented at the top of the
# script.
#
# This is NOT a production-grade Tailscale coordination server —
# only the preauth-minting surface is implemented today; see
# `docs/tailscale-interop-blocker.md` for what's still missing
# between "we mint a preauth key" and "tailscale ping succeeds."
#
# ## Architecture choice: mesh-control runs as a slim shim, not as
# `octravpn-node run`.
#
# The full daemon (`octravpn-node run`) requires a live Octra RPC
# endpoint, a bonded operator wallet, sealed WireGuard keys, and a
# fresh on-chain attestation before its `/health` flips green. None
# of those are interesting to a Tailscale-interop test: the only
# surface the test exercises is the preauth minter (via the
# `mesh mint-preauth` subcommand, which is gated *before* `Hub::new`
# and so doesn't touch chain / wallet state).
#
# We therefore run mesh-control as a sleeping `debian:bookworm-slim`
# with the binary bind-mounted in. `docker exec ... octravpn-node
# mesh mint-preauth …` is enough to clear step 3 of run-interop.sh.
# When the full coordination plane lands, this service grows a
# proper `command:` invocation that mounts a node.toml + keys.

services:
  mesh-control:
    image: debian:bookworm-slim
    container_name: tsi-mesh-control
    working_dir: /work
    environment:
      # Surface env-var the future HTTP plane will pick up. Kept
      # here so the test can switch over to the running-daemon path
      # by changing only the command line.
      OCTRAVPN_ADMIN_TOKEN: "interop-test-token"
      # `headscale_api::tailscale_wire=debug` surfaces the raw_tls
      # peek/dispatch decisions + the /ts2021 noise handshake state
      # transitions. Keep it on while the post-/ts2021 noise transport
      # wall (see docs/tailscale-interop-blocker.md 2026-05-19
      # §"Post-/ts2021-drain fix") is still open so operators get a
      # connection-by-connection trace.
      RUST_LOG: "info,octravpn_node=debug,headscale_api::tailscale_wire=debug"
      # Wall 6: point the mesh-control at the one-region DERP map
      # fixture mounted in below. Unset on non-interop deployments ⇒
      # empty DERPMap (the pre-Wall-6 default). See
      # `docs/tailscale-interop-blocker.md` 2026-05-19 §"Wall 6 closed"
      # for why this is load-bearing.
      OCTRAVPN_DERP_MAP_PATH: "/work/derp-map.json"
    # Run the Tailscale-wire control plane (Hub-free).
    # `octravpn-node mesh serve` brings up:
    #   - /admin/preauth — preauth-key minter (token-gated by
    #     OCTRAVPN_ADMIN_TOKEN).
    #   - /key + /ts2021 + /machine/.../{register,map} — the
    #     Tailscale-wire surface (PRs 1-4 in
    #     docs/tailscale-interop-blocker.md).
    # No chain / wallet state required. State persists under
    # /work/state across container restarts.
    command:
      - "octravpn-node"
      - "mesh"
      - "serve"
      - "--listen=0.0.0.0:51821"
      - "--https-listen=0.0.0.0:443"
      # SAN hostname has to match what the peer container resolves
      # the login-server URL to. We use the docker-compose service
      # name (`tsi-mesh-control`) since both peers join the same
      # bridge network.
      - "--cert-hostname=tsi-mesh-control"
      - "--state-dir=/work/state/tailscale-wire"
      - "--tailnet-id=interop-test"
    ports:
      # Publish 51821 so run-interop.sh's curl from the host can
      # reach /admin/preauth. The peer containers reach it via
      # docker-network DNS (`http://tsi-mesh-control:51821`) and
      # don't need the host port.
      - "51821:51821"
      # Publish 443 so curl from the host can verify the TLS
      # listener too. Stock `tailscale up` v1.78+ forces a parallel
      # HTTPS-on-443 dial after the initial /key probe — see
      # `docs/tailscale-interop-blocker.md` 2026-05-19 §"Wire-format
      # surprise".
      - "8443:443"
    # The TLS cert is minted under /work/state/tailscale-wire/tls.crt.
    # Expose that path to the peer containers via a shared bind mount
    # below so `run-interop.sh` can copy it into their trust stores.
    volumes:
      - type: bind
        source: ../../../target/linux-debug/debug/octravpn-node
        target: /usr/local/bin/octravpn-node
        read_only: true
      - type: bind
        source: ./state
        target: /work/state
      # Wall 6 fixture: one-region DERPMap pointing at the `derp-1`
      # sidecar below. `OCTRAVPN_DERP_MAP_PATH` (above) tells the
      # mesh-control daemon's wire-state loader to ingest this.
      - type: bind
        source: ./derp-map.json
        target: /work/derp-map.json
        read_only: true
    networks:
      - tsi-net

  # Wall 6: DERP relay sidecar. Stock `tailscale` v1.78+ refuses to
  # advance past `BackendState=Starting` without a reachable DERP
  # relay, even on a docker bridge where peers should reach each
  # other directly. We build the upstream `cmd/derper` binary from
  # the BSD-3-licensed `tailscale/tailscale` repo via
  # `Dockerfile.derper`; `run-interop.sh` mints a self-signed TLS
  # cert into `./derp-certs/` before bringing the stack up, and the
  # mesh-control serves a one-region `DerpMap` pointing here. See
  # `docs/tailscale-interop-blocker.md` 2026-05-19 §"Wall 6 closed".
  derp-1:
    build:
      context: .
      dockerfile: Dockerfile.derper
    image: octravpn-interop-derper:latest
    container_name: tsi-derp-1
    hostname: derp-1
    command:
      # Go-style single-dash flags (the upstream cmd/derper uses
      # `flag.StringVar` etc., not posix double-dash).
      - "-hostname=derp-1"
      - "-certmode=manual"
      - "-certdir=/derp-certs"
      # Disable the plain-HTTP port — clients reach us via the
      # MapResponse-advertised TLS port only.
      - "-http-port=-1"
      - "-a=:443"
      # STUN is irrelevant on a single docker bridge (no NAT) — keep
      # the surface small by disabling it.
      - "-stun=false"
    volumes:
      - type: bind
        source: ./derp-certs
        target: /derp-certs
        read_only: true
    networks:
      - tsi-net

  # Two stock Tailscale containers — the actual interop subjects.
  ts-peer-a:
    image: tailscale/tailscale:latest
    container_name: tsi-peer-a
    hostname: ts-peer-a
    cap_add: [NET_ADMIN, SYS_MODULE]
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tsi-peer-a-state:/var/lib/tailscale
      # Read-only access to the mesh-control state dir so the peer
      # can pick up the self-signed cert and install it into its
      # trust store. `run-interop.sh` does the `cp` +
      # `update-ca-certificates` dance once the mesh-control has
      # minted the cert.
      - type: bind
        source: ./state
        target: /mnt/mesh-control-state
        read_only: true
      # Wall 6: read-only access to the derper sidecar's cert so each
      # peer can install it into its trust store. The `tls.key` is
      # also mounted-by but never copied (the peer only needs the
      # cert).
      - type: bind
        source: ./derp-certs
        target: /mnt/derp-certs
        read_only: true
    environment:
      TS_HOSTNAME: peer-a
      TS_STATE_DIR: /var/lib/tailscale
    # Override containerboot: it exits when TS_AUTHKEY is unset.
    # We want the daemon up and idle so `run-interop.sh` can drive
    # `tailscale up` via `docker exec` once it has a freshly
    # minted preauth key.
    entrypoint:
      - sh
      - -c
      - |
        # Install the mesh-control self-signed cert into the system
        # trust store BEFORE tailscaled starts — `tailscaled` reads the
        # root cert set once at boot. Wait briefly for the cert to
        # appear (the mesh-control container mints it on first :443
        # bind, which happens in parallel with this startup).
        for _ in $(seq 1 30); do
            if [ -s /mnt/mesh-control-state/tailscale-wire/tls.crt ]; then
                break
            fi
            sleep 1
        done
        if [ -s /mnt/mesh-control-state/tailscale-wire/tls.crt ]; then
            mkdir -p /usr/local/share/ca-certificates
            cp /mnt/mesh-control-state/tailscale-wire/tls.crt \
               /usr/local/share/ca-certificates/octravpn-mesh-control.crt
            # Wall 6: also install the DERP sidecar's self-signed
            # cert if present. The `InsecureForTests: true` flag in
            # our DerpMap makes the daemon accept it anyway, but
            # we install into the trust store too so a future
            # InsecureForTests-off configuration round-trips.
            if [ -s /mnt/derp-certs/derp-1.crt ]; then
                cp /mnt/derp-certs/derp-1.crt \
                   /usr/local/share/ca-certificates/octravpn-derp-1.crt
            fi
            update-ca-certificates 2>&1 | tail -3 || true
        else
            echo "WARN: TLS cert not present; tailscaled may fail TLS verification" >&2
        fi
        # TS_DEBUG_NOISE=1 dumps EarlyNoise traffic into the
        # tailscaled stderr stream — used by P0-4 / PR 4 to
        # capture real client bytes against our challenge payload.
        TS_DEBUG_NOISE=1 \
          tailscaled --statedir=/var/lib/tailscale --tun=userspace-networking \
                    --socket=/var/run/tailscale/tailscaled.sock &
        # Keep PID 1 alive; the daemon runs in the background.
        wait $!
    networks:
      - tsi-net

  ts-peer-b:
    image: tailscale/tailscale:latest
    container_name: tsi-peer-b
    hostname: ts-peer-b
    cap_add: [NET_ADMIN, SYS_MODULE]
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tsi-peer-b-state:/var/lib/tailscale
      - type: bind
        source: ./state
        target: /mnt/mesh-control-state
        read_only: true
      # Wall 6: read-only access to the derper sidecar's cert so each
      # peer can install it into its trust store. The `tls.key` is
      # also mounted-by but never copied (the peer only needs the
      # cert).
      - type: bind
        source: ./derp-certs
        target: /mnt/derp-certs
        read_only: true
    environment:
      TS_HOSTNAME: peer-b
      TS_STATE_DIR: /var/lib/tailscale
    # Override containerboot: it exits when TS_AUTHKEY is unset.
    # We want the daemon up and idle so `run-interop.sh` can drive
    # `tailscale up` via `docker exec` once it has a freshly
    # minted preauth key.
    entrypoint:
      - sh
      - -c
      - |
        # Install the mesh-control self-signed cert into the system
        # trust store BEFORE tailscaled starts — `tailscaled` reads the
        # root cert set once at boot. Wait briefly for the cert to
        # appear (the mesh-control container mints it on first :443
        # bind, which happens in parallel with this startup).
        for _ in $(seq 1 30); do
            if [ -s /mnt/mesh-control-state/tailscale-wire/tls.crt ]; then
                break
            fi
            sleep 1
        done
        if [ -s /mnt/mesh-control-state/tailscale-wire/tls.crt ]; then
            mkdir -p /usr/local/share/ca-certificates
            cp /mnt/mesh-control-state/tailscale-wire/tls.crt \
               /usr/local/share/ca-certificates/octravpn-mesh-control.crt
            # Wall 6: also install the DERP sidecar's self-signed
            # cert if present. The `InsecureForTests: true` flag in
            # our DerpMap makes the daemon accept it anyway, but
            # we install into the trust store too so a future
            # InsecureForTests-off configuration round-trips.
            if [ -s /mnt/derp-certs/derp-1.crt ]; then
                cp /mnt/derp-certs/derp-1.crt \
                   /usr/local/share/ca-certificates/octravpn-derp-1.crt
            fi
            update-ca-certificates 2>&1 | tail -3 || true
        else
            echo "WARN: TLS cert not present; tailscaled may fail TLS verification" >&2
        fi
        # TS_DEBUG_NOISE=1 dumps EarlyNoise traffic into the
        # tailscaled stderr stream — used by P0-4 / PR 4 to
        # capture real client bytes against our challenge payload.
        TS_DEBUG_NOISE=1 \
          tailscaled --statedir=/var/lib/tailscale --tun=userspace-networking \
                    --socket=/var/run/tailscale/tailscaled.sock &
        # Keep PID 1 alive; the daemon runs in the background.
        wait $!
    networks:
      - tsi-net

networks:
  tsi-net:
    driver: bridge

volumes:
  tsi-peer-a-state:
  tsi-peer-b-state:
