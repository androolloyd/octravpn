# cargo-deny config: license + advisories + bans.
# Run: cargo deny check
[advisories]
yanked = "warn"
ignore = [
  # No fixed replacement from tun-rs/netlink-packet-core yet.
  "RUSTSEC-2024-0436",
  # Removed from the companion headscale-rs audit branch by switching
  # to rustls-pki-types' built-in PEM parser.
  "RUSTSEC-2025-0134",
]

[licenses]
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "WTFPL",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
